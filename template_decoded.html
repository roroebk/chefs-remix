  <style>/* Chef's Remix v3 — NEON_GRID — dark industrial DAW skin */
:root {
  --surface-0: #07080a; --surface-1: #0c0a12; --surface-2: #15111d; --surface-3: #1e1730;
  --hairline: rgba(255,255,255,0.07); --hairline-2: rgba(255,255,255,0.04);
  --text-hi: #e8eaed; --text: #c3c8cf; --dim: #8b9098; --faint: #5a606a;
  --accent: #39ff14; --accent-ink: #07140a; --accent-2: #ff5cc8; --accent-3: #2ea6ff;
  --meter-grn: #2ecc71; --meter-yel: #f1c40f; --meter-red: #e74c3c;
  --glow: 1; --beat-contrast: 1; --gs: 1;
  --row: 22px; --label-w: 130px; --route-w: 36px;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --ui: "Archivo", "Space Grotesk", system-ui, sans-serif;
  --disp: "Space Grotesk", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #000; overflow: hidden; }
body { font-family: var(--ui); color: var(--text); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }
::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2f38; border-radius: 6px; border: 2px solid var(--surface-1); }
::-webkit-scrollbar-thumb:hover { background: #3a414c; }

/* fit-scale stage */
#fit { position: fixed; inset: 0; background:
  radial-gradient(1200px 700px at 70% -10%, rgba(157,78,221,0.07), transparent 60%),
  radial-gradient(900px 600px at 0% 110%, rgba(199,125,255,0.05), transparent 60%), #000;
  display: grid; place-items: center; }
.stage { width: 1920px; height: 1080px; background: var(--surface-0); overflow: hidden;
  display: flex; flex-direction: column; transform-origin: top left; position: absolute; top: 0; left: 0;
  box-shadow: 0 0 0 1px var(--hairline), 0 40px 120px rgba(0,0,0,0.6); }
.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ---------- transport ---------- */
.transport { height: 64px; flex: none; display: flex; align-items: center; gap: 18px; padding: 0 18px;
  background: linear-gradient(180deg, var(--surface-2), var(--surface-1)); border-bottom: 1px solid var(--hairline); position: relative; z-index: 30; }
.brand { display: flex; align-items: center; gap: 11px; padding-right: 18px; border-right: 1px solid var(--hairline); }
.brand .logo { width: 38px; height: 38px; border-radius: 9px; display: grid; place-items: center;
  background: linear-gradient(135deg, var(--accent), #1a8f0a); color: var(--accent-ink);
  box-shadow: 0 0 calc(16px * var(--glow)) color-mix(in srgb, var(--accent) 60%, transparent); }
.brand h1 { font-family: var(--disp); font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-hi); line-height: 1; }
.brand .proj { font-family: var(--mono); font-size: 10.5px; color: var(--accent); letter-spacing: 0.16em; margin-top: 3px; }

.t-group { display: flex; align-items: center; gap: 8px; padding: 0 16px; border-right: 1px solid var(--hairline); height: 100%; }
.t-group:last-child { border-right: none; }
.tbtn { width: 40px; height: 40px; border-radius: 8px; display: grid; place-items: center; background: var(--surface-3);
  border: 1px solid var(--hairline); color: var(--text); transition: .12s; }
.tbtn:hover { background: #232831; color: var(--text-hi); border-color: rgba(255,255,255,0.14); }
.tbtn.play.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); box-shadow: 0 0 calc(18px*var(--glow)) color-mix(in srgb, var(--accent) 55%, transparent); }
.tbtn.rec { color: var(--accent-2); }
.tbtn.rec.on { background: var(--accent-2); color: #fff; }

.readout { display: flex; flex-direction: column; align-items: flex-start; min-width: 86px; }
.readout .lbl { font-size: 8.5px; letter-spacing: 0.18em; color: var(--faint); text-transform: uppercase; }
.readout .val { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text-hi); line-height: 1.05; }
.readout .val .u { font-size: 11px; color: var(--dim); margin-left: 3px; font-weight: 500; }
.readout.clock .val { color: var(--accent-3); }

.knob-wrap { display: flex; align-items: center; gap: 9px; }
.slider { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 3px; background: #2a2f38; outline: none; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 calc(8px*var(--glow)) color-mix(in srgb,var(--accent) 60%, transparent); }
.swing-mini { width: 120px; }

.pat-pills { display: flex; gap: 5px; }
.pat-pill { width: 34px; height: 38px; border-radius: 8px; background: var(--surface-3); border: 1px solid var(--hairline);
  font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--dim); display: grid; place-items: center; transition: .12s; }
.pat-pill:hover { color: var(--text-hi); }
.pat-pill.on { background: color-mix(in srgb, var(--accent) 18%, var(--surface-3)); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
.spacer { flex: 1; }
.master-meter { display: flex; align-items: center; gap: 10px; }
.btn { padding: 0 14px; height: 38px; border-radius: 8px; font-size: 12.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--hairline); background: var(--surface-3); transition: .12s; }
.btn:hover { border-color: rgba(255,255,255,0.16); color: var(--text-hi); }
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn.ghost { background: transparent; }

/* ---------- workspace ---------- */
.workspace { flex: 1; display: flex; min-height: 0; }
.rail { width: 218px; flex: none; background: var(--surface-1); border-right: 1px solid var(--hairline); display: flex; flex-direction: column; transition: width .18s; }
.rail.collapsed { width: 40px; }
.rail-head { height: 38px; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-bottom: 1px solid var(--hairline); flex: none; }
.rail-head .ttl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-hi); white-space: nowrap; }
.rail-head .cx { margin-left: auto; width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; color: var(--dim); }
.rail-head .cx:hover { background: var(--surface-3); color: var(--text-hi); }
.rail.collapsed .ttl, .rail.collapsed .brws { display: none; }
/* collapsed rail is only 40px wide — hide the logo and drop the head padding so the reopen
   chevron (.cx) stays inside the rail box and remains clickable (previously it overflowed past
   the 40px edge and the toggle appeared frozen). */
.rail.collapsed .rail-logo { display: none; }
.rail.collapsed .rail-head { padding: 0; justify-content: center; gap: 0; }
.rail.collapsed .cx { margin-left: 0; }
.brws { flex: 1; overflow-y: auto; padding: 8px 0; }
.brws-grp { padding: 0 8px; }
.brws-grp h5 { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); padding: 12px 8px 6px; }
.brws-item { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 7px; cursor: pointer; transition: .1s; }
.brws-item:hover { background: var(--surface-3); }
.brws-item .ico { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; flex: none; background: var(--surface-3); }
.brws-item .nm { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brws-item .tag { margin-left: auto; font-family: var(--mono); font-size: 8.5px; color: var(--faint); letter-spacing: 0.1em; }
.brws-item.sel { background: var(--surface-3); }

/* file browser tabs + tree */
.fb-search { flex: none; display: flex; align-items: center; gap: 7px; margin: 8px 8px 2px; padding: 0 9px; height: 30px; border-radius: 8px; background: var(--surface-0); border: 1px solid var(--hairline); }
.fb-search:focus-within { border-color: color-mix(in srgb,var(--accent) 45%, transparent); }
.fb-search-ic { color: var(--faint); display: grid; place-items: center; flex: none; }
.fb-search-input { flex: 1; min-width: 0; background: none; border: none; outline: none; color: var(--text-hi); font-size: 12px; font-family: var(--ui); }
.fb-search-input::placeholder { color: var(--faint); }
.fb-search-x { width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center; color: var(--faint); flex: none; }
.fb-search-x:hover { background: var(--surface-3); color: var(--text-hi); }
.tree-empty { padding: 24px 14px; font-size: 11.5px; color: var(--faint); text-align: center; }
.trow .tpath { font-family: var(--mono); font-size: 8px; color: var(--faint); margin-left: auto; padding-left: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 96px; }
.fb-tabs { display: flex; gap: 2px; padding: 6px 8px 0; flex: none; }
.fb-tab { flex: 1; height: 24px; border-radius: 6px 6px 0 0; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; color: var(--dim); background: var(--surface-2); border: 1px solid var(--hairline); border-bottom: none; }
.fb-tab.on { color: var(--accent); background: var(--surface-1); border-color: color-mix(in srgb,var(--accent) 35%, var(--hairline)); }
.link-btn { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 8px 8px 6px; height: 32px; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface-2));
  border: 1px dashed color-mix(in srgb, var(--accent) 40%, var(--hairline)); transition: .12s; width: calc(100% - 16px); }
.link-btn:hover { background: color-mix(in srgb, var(--accent) 16%, var(--surface-2)); border-style: solid; color: var(--text-hi); }
.fb-improw { display: flex; gap: 6px; margin: 8px 8px 4px; }
.fb-improw .link-btn { font-size: 11px; gap: 5px; }
.fb-drophint { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 0 8px 4px; padding: 5px 8px; font-size: 10px; color: var(--faint); border: 1px dashed var(--hairline); border-radius: 7px; }
.brws.dropping { outline: 2px dashed var(--accent); outline-offset: -4px; background: color-mix(in srgb, var(--accent) 7%, transparent); }
.brws.dropping .fb-drophint { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 55%, transparent); }
.tree { overflow-y: auto; flex: 1; padding-bottom: 10px; }
.tree-sec { font-size: 9px; letter-spacing: 0.16em; color: var(--faint); padding: 10px 12px 5px; text-transform: uppercase; }
.trow { display: flex; align-items: center; gap: 6px; height: 22px; padding-right: 8px; cursor: pointer; transition: background .08s; user-select: none; }
.trow:hover { background: rgba(255,255,255,0.04); }
.trow .tcaret { width: 14px; flex: none; display: grid; place-items: center; color: var(--faint); }
.trow .ticon { display: grid; place-items: center; flex: none; }
.trow .tname { font-size: 11.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.trow.folder .tname { font-weight: 600; }
.trow.user-root { background: rgba(255,179,56,0.06); }
.trow.user-root:hover { background: rgba(255,179,56,0.12); }
.trow.user-root .tname { color: #ffce7a; }
.trow .tcount { font-family: var(--mono); font-size: 9px; color: var(--faint); }
.trow .tunlink { width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center; color: var(--faint); flex: none; }
.trow .tunlink:hover { background: rgba(255,90,80,0.2); color: #ff7a6e; }
.trow.sample { cursor: grab; }
.trow.sample:active { cursor: grabbing; }
.trow.sample .swatch { width: 8px; height: 8px; border-radius: 2px; flex: none; box-shadow: 0 0 5px currentColor; }
.trow .ttype { flex: none; display: inline-flex; align-items: center; opacity: 0.7; }
.trow.sample:hover .ttype { opacity: 1; }
.ce-classbadge { margin-left: 8px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, var(--surface-3)); border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--hairline)); vertical-align: middle; }
.trow.sample .tname { color: var(--text); font-size: 11px; }
.trow.sample .tplay { margin-left: auto; color: var(--faint); opacity: 0; flex: none; display: grid; place-items: center; }
.trow.sample:hover .tplay { opacity: 1; color: var(--accent); }
.trow.sample:hover .tname { color: var(--text-hi); }

/* drop target on channel rows */
.chan-row.drop { background: rgba(255,179,56,0.14); }
.chan-row.drop::after { content: ""; position: absolute; inset: 0; border: 1px dashed #ffb338; border-radius: 2px; pointer-events: none; z-index: 5; }

/* link modal form fields */
.form-field { margin-bottom: 13px; }
.form-field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.text-input { width: 100%; height: 38px; padding: 0 12px; border-radius: 8px; background: var(--surface-0); border: 1px solid var(--hairline);
  color: var(--text-hi); font-size: 13px; font-family: var(--ui); outline: none; transition: .12s; }
.text-input:focus { border-color: color-mix(in srgb,#ffb338 55%, transparent); box-shadow: 0 0 0 2px color-mix(in srgb,#ffb338 18%, transparent); }

.stage-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.tabs { height: 38px; flex: none; display: flex; align-items: stretch; gap: 2px; padding: 0 10px; background: var(--surface-1); border-bottom: 1px solid var(--hairline); }
.tab { display: flex; align-items: center; gap: 8px; padding: 0 16px; font-size: 12.5px; font-weight: 600; color: var(--dim); border-bottom: 2px solid transparent; transition: .12s; }
.tab:hover { color: var(--text-hi); }
.tab.on { color: var(--text-hi); border-bottom-color: var(--accent); }
.tab.on .ti { color: var(--accent); }
.tab .ti { display: grid; place-items: center; }
.auth { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--dim); }
.auth b { color: var(--text-hi); }
.auth .pulse { width: 8px; height: 8px; border-radius: 50%; background: #3a414c; }
.auth.live .pulse { background: var(--accent); box-shadow: 0 0 calc(8px*var(--glow)) var(--accent); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.35; } }

.center { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.top-pane { flex: 1; min-height: 0; display: flex; flex-direction: column; background: var(--surface-0); border-bottom: 1px solid var(--hairline); }
.dashboard { flex: 1.12; min-height: 0; display: flex; }
.dash-mixer { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--surface-1); border-right: 1px solid var(--hairline); }
.dash-graph { width: 560px; flex: none; display: flex; flex-direction: column; background: var(--surface-1); }

.pane-head { height: 32px; flex: none; display: flex; align-items: center; gap: 10px; padding: 0 14px; background: linear-gradient(180deg, var(--surface-2), var(--surface-1)); border-bottom: 1px solid var(--hairline); }
.pane-head .pt { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-hi); }
.pane-head .badge { font-family: var(--mono); font-size: 9.5px; padding: 2px 7px; border-radius: 5px; background: color-mix(in srgb, var(--accent) 16%, var(--surface-3)); color: var(--accent); letter-spacing: 0.06em; }
.pane-head .sub { font-size: 10.5px; color: var(--faint); }
.pane-head .ph-act { margin-left: auto; display: flex; gap: 6px; }
.mini-btn { height: 24px; padding: 0 9px; border-radius: 6px; font-size: 10.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; color: var(--dim); border: 1px solid var(--hairline); background: var(--surface-3); }
.mini-btn:hover { color: var(--text-hi); border-color: rgba(255,255,255,0.16); }

/* ---------- channel rack ---------- */
.rack { flex: 1; overflow: auto; }
.rack-ruler { display: flex; height: 20px; position: sticky; top: 0; z-index: 6; background: var(--surface-1); border-bottom: 1px solid var(--hairline); }
.rack-ruler .rl-pad { width: calc(var(--label-w) + 34px + 46px + var(--route-w)); flex: none; border-right: 1px solid var(--hairline); }
.rack-ruler .rl-grid { flex: 1; display: grid; }
.rack-ruler .rl-beat { font-family: var(--mono); font-size: 9px; color: var(--faint); display: flex; align-items: center; padding-left: 5px; border-left: 1px solid var(--hairline-2); }
.rack-ruler .rl-beat.q { color: var(--dim); border-left-color: var(--hairline); }

.chan-row { display: flex; height: calc(var(--row) * var(--gs)); align-items: stretch; border-bottom: 1px solid var(--hairline-2); position: relative; }
.chan-row:hover { background: rgba(255,255,255,0.012); }
.chan-row.focus { background: rgba(157,78,221,0.06); }
.chan-row.focus::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent); }
.cr-label { width: var(--label-w); flex: none; display: flex; align-items: center; gap: 7px; padding: 0 8px; border-right: 1px solid var(--hairline-2); cursor: pointer; overflow: hidden; }
.cr-led { width: 7px; height: 7px; border-radius: 50%; flex: none; transition: .08s; }
.cr-name { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cr-ms { width: 34px; flex: none; display: flex; gap: 2px; align-items: center; justify-content: center; border-right: 1px solid var(--hairline-2); }
.cr-ms button { width: 14px; height: 14px; border-radius: 3px; font-size: 8px; font-weight: 800; display: grid; place-items: center; background: var(--surface-3); color: var(--faint); border: 1px solid var(--hairline-2); }
.cr-ms button.m.on { background: #c0392b; color: #fff; }
.cr-ms button.s.on { background: var(--accent-3); color: #021726; }
/* per-row delete button (tail of each channel row) */
.cr-del { width: 18px; height: 18px; flex: 0 0 auto; align-self: center; margin: 0 4px; display: flex; align-items: center; justify-content: center; background: transparent; border: 0; color: var(--dim); cursor: pointer; border-radius: 4px; opacity: .45; transition: .12s; }
.cr-del:hover { opacity: 1; color: #ff5470; background: rgba(255,84,112,.12); }
/* add-track CTA + voice-type menu (rendered beneath the rack) */
.addtrack-bar { position: relative; padding: 8px; border-top: 1px solid var(--hairline); }
.addtrack-cta { font: 600 12px/1 "Archivo", sans-serif; color: var(--accent); background: transparent; border: 1px dashed color-mix(in srgb, var(--accent) 50%, transparent); border-radius: 6px; padding: 7px 12px; cursor: pointer; }
.addtrack-cta:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
.addtrack-menu { position: absolute; z-index: 30; margin-top: 4px; background: var(--surface-1); border: 1px solid var(--hairline); border-radius: 8px; padding: 4px; display: flex; flex-direction: column; min-width: 168px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
.addtrack-opt { text-align: left; font: 500 12px/1.3 "Archivo", sans-serif; color: var(--text-hi); background: transparent; border: 0; padding: 7px 9px; border-radius: 5px; cursor: pointer; }
.addtrack-opt:hover { background: rgba(255,255,255,.06); }
/* header "Load Demo" button */
.hdr-btn { align-self: center; font: 600 11px/1 "Archivo", sans-serif; color: var(--text-hi); background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 6px; padding: 7px 10px; cursor: pointer; }
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-btn.on { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, var(--surface-2)); }
.empty-pane { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; color: var(--faint); text-align: center; padding: 24px; }
.empty-pane .ep-ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface-2)); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--hairline)); margin-bottom: 4px; }
.empty-pane .ep-t { font-size: 14px; font-weight: 600; color: var(--text-hi); }
.empty-pane .ep-s { font-size: 12px; color: var(--dim); }
/* DJ-style rotary knobs (FX param editor) */
.fx-knobs { display: flex; flex-wrap: wrap; gap: 16px 20px; margin-top: 14px; }
.rk { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: ns-resize; user-select: none; min-width: 62px; }
.rk-svg { display: block; }
.rk-lbl { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
.rk-val { font-size: 11px; color: var(--text-hi); font-variant-numeric: tabular-nums; }
/* master spectrum analyzer (header) */
.spectrum-wrap { flex: 1; min-width: 60px; display: flex; align-items: center; padding: 0 20px; height: 100%; border-right: 1px solid var(--hairline); }
.spectrum { width: 100%; height: 42px; opacity: 0.95; }
/* bring-your-own-sounds controls (browser) */
.byo { display: flex; gap: 6px; margin: 8px 8px 4px; }
.byo-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 32px; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text-hi); background: var(--surface-2); border: 1px solid var(--hairline); transition: .12s; }
.byo-btn:hover { border-color: color-mix(in srgb, var(--accent) 55%, var(--hairline)); color: var(--accent); }
.byo-btn.import:hover { color: var(--accent-2); border-color: color-mix(in srgb, var(--accent-2) 55%, var(--hairline)); }
.byo-btn.rec.on { color: #fff; background: #c0392b; border-color: #c0392b; animation: rec-pulse 1.1s ease-in-out infinite; }
@keyframes rec-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.5); } 50% { box-shadow: 0 0 0 5px rgba(192,57,43,0); } }
.byo-hint { font-size: 9.5px; color: var(--faint); text-align: center; letter-spacing: 0.04em; margin: 0 8px 6px; }
/* ---------- Linear Timeline (Phase 1, Step 3) ---------- */
.tl { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.tl-toolbar { height: 34px; flex: none; display: flex; align-items: center; gap: 12px; padding: 0 12px; border-bottom: 1px solid var(--hairline); background: var(--surface-1); }
.tl-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-hi); }
.tl-hint { font-size: 10px; color: var(--faint); letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-zoom { margin-left: auto; flex: none; display: flex; align-items: center; gap: 8px; }
.tl-zoom .lbl { font-size: 9px; letter-spacing: 0.14em; color: var(--dim); }
.tl-zoom .slider { width: 150px; }
.tl-zoom .mono { font-size: 10px; color: var(--accent); width: 58px; text-align: right; }
.tl-selcount { flex: none; font-size: 10.5px; color: var(--accent-2); font-weight: 600; }
.tl-scroll { flex: 1; overflow: auto; position: relative; background: var(--surface-0); }
.tl-inner { position: relative; min-width: 100%; }
.tl-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--hairline-2); }
.tl-head { position: sticky; left: 0; z-index: 5; flex: none; display: flex; align-items: center; gap: 7px; padding: 0 10px; background: var(--surface-1); border-right: 1px solid var(--hairline); font-size: 11px; color: var(--text-hi); }
.tl-rulerrow { position: sticky; top: 0; z-index: 6; }
.tl-rulerrow .tl-head { z-index: 7; font-size: 9px; letter-spacing: 0.14em; color: var(--faint); background: var(--surface-2); }
.tl-rulerbody { position: relative; flex: none; background: var(--surface-2); }
.tl-barlabel { position: absolute; top: 0; height: 100%; display: flex; align-items: center; padding-left: 5px; font-family: var(--mono); font-size: 9px; color: var(--faint); border-left: 1px solid var(--hairline-2); }
.tl-barlabel.q { color: var(--dim); border-left-color: var(--hairline); }
.tl-led { width: 8px; height: 8px; border-radius: 50%; flex: none; box-shadow: 0 0 6px currentColor; }
.tl-lname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-body { position: relative; flex: none; background: linear-gradient(180deg, rgba(157,78,221,0.025), transparent); cursor: crosshair; }
.tl-grid { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--hairline-2); }
.tl-grid.q { background: var(--hairline); }
.tl-clip { position: absolute; top: 3px; bottom: 3px; border-radius: 5px; border: 1px solid; overflow: hidden; cursor: grab; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
.tl-clip:active { cursor: grabbing; }
.tl-clip.sel { outline: 2px solid var(--accent); outline-offset: -1px; box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 55%, transparent); }
.tl-clip-lbl { position: absolute; top: 2px; left: 5px; font-size: 9px; font-weight: 600; color: var(--text-hi); pointer-events: none; opacity: 0.9; z-index: 2; }
.tl-clip-notes { position: absolute; inset: 0; }
.tl-note { position: absolute; height: 2px; border-radius: 1px; background: color-mix(in srgb, var(--accent) 82%, #fff); }
.tl-clip.audio { background: linear-gradient(180deg, color-mix(in srgb,var(--accent-3) 32%, var(--surface-2)), var(--surface-2)) !important; }
.tl-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: color-mix(in srgb, var(--accent) 85%, #fff); box-shadow: 0 0 calc(8px*var(--glow)) var(--accent); pointer-events: none; z-index: 8; }
.tl-marquee { position: absolute; z-index: 9; background: rgba(157,78,221,0.18); border: 1px solid var(--accent); border-radius: 2px; pointer-events: none; }
/* scrubbing: clickable ruler + grabbable playhead handle */
.tl-rulerbody.scrub { cursor: text; }
.tl-playhead.grab { pointer-events: auto; cursor: ew-resize; z-index: 10; }
.tl-playhead-grip { position: absolute; top: 0; left: -4px; width: 10px; height: 11px; background: color-mix(in srgb, var(--accent) 92%, #fff); border-radius: 0 0 3px 3px; box-shadow: 0 0 calc(7px*var(--glow)) var(--accent); }
/* clip right-edge trim/chop handle */
.tl-clip-trim { position: absolute; top: 0; right: 0; bottom: 0; width: 7px; cursor: ew-resize; z-index: 4; background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 45%, transparent)); opacity: 0; transition: opacity .1s; }
.tl-clip:hover .tl-clip-trim, .tl-clip.sel .tl-clip-trim { opacity: 1; }
/* adaptive-grid readout chip (timeline + piano roll toolbars) */
.tl-snapchip { font-size: 9px; letter-spacing: 0.12em; color: var(--dim); background: var(--surface-3); border: 1px solid var(--hairline); border-radius: 6px; padding: 3px 8px; white-space: nowrap; }
.tl-snapchip b { color: var(--accent); font-family: var(--mono); letter-spacing: 0; margin-left: 2px; }
/* linked-folder real files get a faint marker dot */
.trow.sample.userfile .swatch { box-shadow: 0 0 0 1.5px color-mix(in srgb, #ffb338 60%, transparent); }
.tl-empty { padding: 44px 24px; text-align: center; color: var(--faint); font-size: 13px; }
/* ---------- Project dropdown ---------- */
.proj-menu { position: relative; align-self: center; }
.proj-dd { position: absolute; top: calc(100% + 5px); left: 0; z-index: 200; width: 240px; padding: 6px; background: var(--surface-1); border: 1px solid var(--hairline); border-radius: 10px; box-shadow: 0 14px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 2px; }
.proj-item { text-align: left; font: 600 12px/1.2 var(--ui); color: var(--text-hi); background: transparent; border: 0; padding: 9px 10px; border-radius: 7px; cursor: pointer; }
.proj-item:hover { background: color-mix(in srgb, var(--accent) 14%, var(--surface-2)); color: var(--accent); }
.proj-sec { font-size: 8.5px; letter-spacing: 0.16em; color: var(--faint); text-transform: uppercase; padding: 8px 10px 3px; }
.proj-saverow { display: flex; gap: 5px; padding: 0 4px 4px; }
.proj-slotname { flex: 1; min-width: 0; height: 28px; padding: 0 9px; border-radius: 7px; background: var(--surface-0); border: 1px solid var(--hairline); color: var(--text-hi); font-size: 12px; font-family: var(--ui); outline: none; }
.proj-slotname:focus { border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
.proj-save { height: 28px; padding: 0 12px; border-radius: 7px; font: 600 11px/1 var(--ui); color: var(--accent-ink); background: var(--accent); border: 0; cursor: pointer; }
.proj-slot { display: flex; align-items: center; gap: 4px; }
.proj-slot-load { flex: 1; text-align: left; font: 500 12px/1.2 var(--mono); color: var(--text); background: transparent; border: 0; padding: 7px 10px; border-radius: 7px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-slot-load:hover { background: var(--surface-2); color: var(--text-hi); }
.proj-slot-del { width: 24px; height: 24px; flex: none; border-radius: 6px; background: transparent; border: 0; color: var(--faint); cursor: pointer; }
.proj-slot-del:hover { background: rgba(255,84,112,0.14); color: #ff5470; }
.proj-empty { font-size: 11px; color: var(--faint); padding: 6px 10px; }
/* ---------- Timeline audio recording ---------- */
.tl-rec { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 11px; border-radius: 7px; font: 600 11px/1 var(--ui); color: var(--text-hi); background: var(--surface-3); border: 1px solid var(--hairline); cursor: pointer; }
.tl-rec:hover { border-color: #ff5470; color: #ff7a8c; }
.tl-rec-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff5470; }
.tl-rec.on { background: #c0392b; color: #fff; border-color: #c0392b; }
.tl-rec.on .tl-rec-dot { background: #fff; animation: rec-pulse 1s ease-in-out infinite; }
.tl-rec.screen { color: var(--dim); }
.tl-rec.screen:hover { border-color: color-mix(in srgb, var(--accent) 55%, var(--hairline)); color: var(--accent); }
.tl-rec.screen.on { background: #6a1fb0; border-color: #6a1fb0; color: #fff; }
.tl-rec:disabled, .tl-mon:disabled { opacity: .4; cursor: not-allowed; }
.tl-mon { display: inline-flex; align-items: center; gap: 5px; height: 24px; padding: 0 10px; border-radius: 7px; font: 600 11px/1 var(--ui); color: var(--dim); background: var(--surface-3); border: 1px solid var(--hairline); cursor: pointer; }
.tl-mon.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 55%, var(--hairline)); }
.tl-clip-wave { position: absolute; inset: 2px 1px; pointer-events: none; }
.tl-wavebar { position: absolute; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--accent-2), var(--accent)); border-radius: 1px; opacity: 0.92; }
/* Pass 5: melodic midi clips render a waveform (tinted with the lane color via inline bg) */
.tl-clip-wave.melodic { inset: 2px 2px; align-items: center; }
.tl-clip-wave.melodic .tl-wavebar { bottom: 50%; transform: translateY(50%); opacity: 0.85; border-radius: 1px; }
.tl-clip.melodic .tl-clip-notes { display: none; }
.tl-typeglyph { flex: none; display: inline-flex; align-items: center; opacity: 0.85; }
.tl-clip.recording { border-color: #ff5470 !important; box-shadow: 0 0 12px rgba(255,84,112,0.5); background: color-mix(in srgb, #ff5470 12%, var(--surface-2)) !important; z-index: 6; }
.tl-countin { position: fixed; inset: 0; z-index: 60; display: grid; place-items: center; pointer-events: none; }
.tl-countin-ring { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 40px color-mix(in srgb, var(--accent) 60%, transparent); animation: countin-pulse 0.5s ease-out; }
@keyframes countin-pulse { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(1.18); opacity: 0.45; } }
.tl-countin-num { position: absolute; font: 700 15px/1 var(--disp); letter-spacing: 0.16em; color: var(--text-hi); text-transform: uppercase; }
/* ---------- Timeline automation lanes ---------- */
.tl-mix { margin-left: auto; flex: none; display: flex; align-items: center; gap: 6px; }
.tl-mute { flex: none; width: 18px; height: 18px; border-radius: 5px; font: 700 10px/1 var(--ui); color: var(--faint); background: transparent; border: 1px solid var(--hairline-2); cursor: pointer; }
.tl-mute:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
.tl-mute.on { color: #1f0a0a; background: #ff5470; border-color: #ff5470; }
.tl-mix + .tl-autobtn { margin-left: 6px; }
.tl-del { flex: none; width: 18px; height: 18px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; color: var(--faint); background: transparent; border: 1px solid var(--hairline-2); cursor: pointer; }
.tl-del:hover { color: #ff5470; border-color: color-mix(in srgb, #ff5470 55%, transparent); }
.tl-clip-notesbtn { position: absolute; top: 2px; right: 16px; z-index: 3; width: 15px; height: 15px; padding: 0; border-radius: 4px; font-size: 10px; line-height: 1; color: var(--text-hi); background: rgba(0,0,0,0.35); border: 1px solid var(--hairline-2); cursor: pointer; opacity: 0; transition: opacity .12s; }
.tl-clip:hover .tl-clip-notesbtn { opacity: 1; }
.tl-clip-notesbtn:hover { color: var(--accent); border-color: var(--accent); }
.tl-clip-fxdot { position: absolute; top: 4px; left: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-2, #ff5cc8); box-shadow: 0 0 5px var(--accent-2, #ff5cc8); }
.fx-clipbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; padding: 7px 9px; border-radius: 8px; background: var(--surface-3); border: 1px solid var(--hairline); font-size: 11px; color: var(--dim); }
.fx-clipbar-lbl { color: var(--dim); } .fx-clipbar-lbl b { color: var(--text-hi); }
/* per-clip route-override badge on the timeline */
.tl-clip-fxbadge { position: absolute; top: 2px; left: 12px; z-index: 3; padding: 0 4px; height: 13px; border-radius: 4px; font-size: 9px; line-height: 13px; font-weight: 700; letter-spacing: .04em; color: #0a0a0f; background: var(--accent-3, #2ee6c8); box-shadow: 0 0 6px var(--accent-3, #2ee6c8); }
/* piano-roll per-pattern length selector */
.pr-lenpick { display: inline-flex; align-items: center; gap: 4px; margin-left: 10px; }
.pr-lenpick .lbl { font-size: 9px; letter-spacing: .16em; color: var(--faint); }
.pr-lenbtn { min-width: 22px; height: 22px; padding: 0 5px; border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--dim); background: var(--surface-3); border: 1px solid var(--hairline-2); cursor: pointer; }
.pr-lenbtn:hover { color: var(--text-hi); border-color: var(--accent); }
.pr-lenbtn.on { color: #0a0a0f; background: var(--accent); border-color: var(--accent); }
/* Clip Editor overlay */
.clip-editor .ce-tabs { display: flex; gap: 4px; padding: 0 16px; border-bottom: 1px solid var(--hairline); }
.ce-tab { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--dim); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.ce-tab:hover { color: var(--text-hi); }
.ce-tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.ce-stepgrid { display: grid; gap: 4px; }
.ce-step { height: 30px; border-radius: 6px; background: var(--surface-3); border: 1px solid var(--hairline-2); cursor: pointer; }
.ce-step.beat { border-color: var(--hairline); }
.ce-step:hover { border-color: var(--accent); }
.ce-step.on { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent); }
.ce-fxmode { display: flex; flex-direction: column; gap: 8px; }
.ce-radio { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); padding: 7px 9px; border-radius: 8px; background: var(--surface-3); border: 1px solid var(--hairline); cursor: pointer; }
.ce-radio.on { color: var(--text-hi); border-color: var(--accent); }
.ce-inssel { margin-left: 4px; background: var(--surface-2); color: var(--text-hi); border: 1px solid var(--hairline-2); border-radius: 6px; padding: 3px 6px; font-size: 11px; }
.ce-slotrow { display: flex; gap: 5px; flex-wrap: wrap; }
.ce-slot { min-width: 30px; height: 30px; padding: 0 7px; border-radius: 6px; font-size: 10px; color: var(--faint); background: var(--surface-3); border: 1px solid var(--hairline-2); cursor: pointer; }
.ce-slot.filled { color: var(--text-hi); border-color: var(--accent); }
.ce-slot.byp { opacity: .45; }
.ce-slot:hover { border-color: var(--accent); }
/* merged per-track FX + step-modulation panel (T6) */
.trackfx { display: flex; flex-direction: column; height: 100%; min-height: 0; }
.trackfx-slots { display: flex; gap: 5px; flex-wrap: wrap; padding: 8px 10px; }
.trackfx-modlbl, .ce-stepmod .trackfx-modlbl { font-size: 9px; letter-spacing: .18em; color: var(--faint); padding: 4px 10px 2px; border-top: 1px solid var(--hairline); }
.trackfx .dash-graph { flex: 1; min-height: 0; }
.ce-stepmod { margin-top: 10px; border-top: 1px solid var(--hairline); }
.tl-autobtn { margin-left: auto; flex: none; width: 18px; height: 18px; border-radius: 5px; font-size: 12px; line-height: 1; color: var(--faint); background: transparent; border: 1px solid var(--hairline-2); cursor: pointer; }
.tl-autobtn:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, transparent); }
.tl-autobtn.on { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }
.tl-automenu { position: absolute; top: 100%; left: 8px; z-index: 50; margin-top: 2px; background: var(--surface-1); border: 1px solid var(--hairline); border-radius: 8px; padding: 4px; display: flex; flex-direction: column; min-width: 96px; box-shadow: 0 10px 28px rgba(0,0,0,0.55); }
.tl-automenu button { text-align: left; font: 600 11px/1.2 var(--ui); color: var(--text); background: transparent; border: 0; padding: 6px 9px; border-radius: 5px; cursor: pointer; }
.tl-automenu button:hover { background: var(--surface-2); color: var(--text-hi); }
.tl-automenu button.on { color: var(--accent); }
.tl-automenu button.off { color: var(--faint); border-top: 1px solid var(--hairline-2); margin-top: 2px; }
.tl-autorow { background: rgba(157,78,221,0.035); }
.tl-autohead { flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px; }
.tl-autolbl { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
.tl-autohint { font-size: 8px; color: var(--faint); white-space: nowrap; }
.tl-autobody { flex: none; display: block; background: linear-gradient(180deg, rgba(157,78,221,0.05), transparent); cursor: crosshair; }
.tl-autoline { fill: none; stroke: var(--accent); stroke-width: 2; filter: drop-shadow(0 0 calc(3px*var(--glow)) var(--accent)); }
.tl-autopt { fill: var(--surface-0); stroke: var(--accent); stroke-width: 2; cursor: grab; }
.tl-autopt:hover { fill: var(--accent); }
/* timeline tool toggle (Arrow / Marquee) */
.tl-tools { display: inline-flex; gap: 2px; margin-left: 2px; }
.tl-tool { width: 24px; height: 24px; border-radius: 6px; font-size: 12px; color: var(--dim); background: var(--surface-3); border: 1px solid var(--hairline); cursor: pointer; }
.tl-tool.on { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }
/* ---------- Command palette (Ctrl/⌘+K) ---------- */
.cmdp-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(5,4,10,0.55); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); display: flex; align-items: flex-start; justify-content: center; padding-top: 14vh; animation: cmdp-in .14s ease; }
@keyframes cmdp-in { from { opacity: 0; } }
.cmdp { width: 520px; max-width: 92vw; background: var(--surface-1); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--hairline)); border-radius: 14px; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px color-mix(in srgb, var(--accent) 16%, transparent), 0 0 60px color-mix(in srgb, var(--accent) 18%, transparent); overflow: hidden; }
.cmdp-input { width: 100%; height: 52px; padding: 0 18px; background: transparent; border: 0; border-bottom: 1px solid var(--hairline); color: var(--text-hi); font: 500 15px/1 var(--ui); outline: none; }
.cmdp-list { max-height: 320px; overflow-y: auto; padding: 6px; }
.cmdp-item { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; border: 0; background: transparent; border-radius: 8px; cursor: pointer; text-align: left; }
.cmdp-item.sel { background: color-mix(in srgb, var(--accent) 18%, var(--surface-2)); }
.cmdp-lbl { font: 500 13px/1.2 var(--ui); color: var(--text-hi); }
.cmdp-hint { font: 600 10px/1 var(--mono); color: var(--accent); padding: 3px 7px; border-radius: 5px; background: color-mix(in srgb, var(--accent) 14%, transparent); white-space: nowrap; }
.cmdp-empty { padding: 24px; text-align: center; color: var(--faint); font-size: 13px; }
.cmdp-foot { padding: 8px 14px; border-top: 1px solid var(--hairline); font: 500 10px/1 var(--mono); letter-spacing: 0.08em; color: var(--faint); }
/* ---------- Phase 6 polish: violet scrollbars, selection, glow ---------- */
::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--accent) 26%, #16131f); border: 2px solid var(--surface-1); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--accent) 46%, #16131f); }
::selection { background: color-mix(in srgb, var(--accent) 45%, transparent); color: #fff; }
.hdr-btn, .tbtn, .btn, .mini-btn, .tl-rec, .tl-mon { transition: background .12s, color .12s, border-color .12s, box-shadow .15s; }
.text-input:focus, .cmdp-input:focus, .proj-slotname:focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent); }
.cr-route { width: var(--route-w); flex: none; display: grid; place-items: center; border-right: 1px solid var(--hairline-2); cursor: ns-resize; }
.cr-route span { font-family: var(--mono); font-size: 9.5px; font-weight: 700; color: var(--accent-3); letter-spacing: 0.02em; }
.cr-route:hover { background: rgba(46,166,255,0.08); }
.cr-micro { width: 46px; flex: none; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 0 4px; border-right: 1px solid var(--hairline-2); }
.mk { width: 17px; height: 17px; position: relative; flex: none; cursor: ns-resize; }
.ms { display: flex; gap: 2px; margin-left: 1px; }
.ms button { width: 14px; height: 14px; border-radius: 3px; font-size: 8px; font-weight: 800; display: grid; place-items: center; background: var(--surface-3); color: var(--faint); border: 1px solid var(--hairline-2); }
.ms button.m.on { background: #c0392b; color: #fff; }
.ms button.s.on { background: var(--accent-3); color: #021726; }

.steps { flex: 1; display: grid; gap: 1px; padding: 2px 4px; position: relative; }
.step { border-radius: 2px; position: relative; cursor: pointer; transition: background .07s, box-shadow .07s; }
.step.blkA { background: rgba(157,78,221,calc(0.13 * var(--beat-contrast))); }
.step.blkB { background: rgba(255,255,255,calc(0.014 * var(--beat-contrast))); }
.step.down { box-shadow: inset 1px 0 0 rgba(255,255,255,0.1); }
.step.on { box-shadow: 0 0 calc(7px*var(--glow)) var(--stepc), inset 0 0 0 1px rgba(255,255,255,0.18); }
.step:hover:not(.on) { background: rgba(255,255,255,0.1); }
.playcol { position: absolute; top: 0; bottom: 0; width: 2px; background: color-mix(in srgb, var(--accent) 85%, #fff); box-shadow: 0 0 calc(10px*var(--glow)) var(--accent); pointer-events: none; z-index: 4; opacity: 0; }
.playcol.on { opacity: 1; }

/* ---------- graph editor ---------- */
.ge-tabs { display: flex; gap: 4px; padding: 7px 14px 0; flex: none; }
.ge-tab { padding: 5px 12px; border-radius: 6px 6px 0 0; font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--dim); background: var(--surface-2); border: 1px solid var(--hairline); border-bottom: none; }
.ge-tab.on { color: var(--accent); background: var(--surface-0); border-color: color-mix(in srgb,var(--accent) 40%, var(--hairline)); }
.ge-body { flex: 1; min-height: 0; padding: 0 14px 12px; display: flex; flex-direction: column; }
.ge-canvas-wrap { flex: 1; min-height: 0; background: var(--surface-0); border: 1px solid var(--hairline); border-radius: 0 7px 7px 7px; position: relative; overflow: hidden; }
.ge-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
.ge-foot { display: flex; align-items: center; gap: 14px; padding-top: 9px; font-size: 11px; color: var(--dim); flex: none; }
.ge-foot .hint { display: flex; align-items: center; gap: 6px; }
.ge-foot .hint kbd { font-family: var(--mono); font-size: 9.5px; padding: 1px 5px; border-radius: 4px; background: var(--surface-3); border: 1px solid var(--hairline); color: var(--text); }
.ge-foot .focuslbl { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--accent); }

/* ---------- mixer ---------- */
.mixer-body { flex: 1; min-height: 0; display: flex; }
.mixer { flex: 1; min-width: 0; display: flex; overflow-x: auto; overflow-y: hidden; padding: 8px; gap: 6px; }
.strip { width: 78px; flex: none; display: flex; flex-direction: column; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 8px; overflow: hidden; }
.strip.master { width: 92px; background: linear-gradient(180deg, var(--surface-3), var(--surface-2)); border-color: color-mix(in srgb,var(--accent) 30%, var(--hairline)); }
.strip.sel { border-color: color-mix(in srgb,var(--accent-3) 60%, transparent); box-shadow: 0 0 0 1px color-mix(in srgb,var(--accent-3) 40%, transparent); }
.strip-name { height: 24px; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: var(--mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-hi); border-bottom: 1px solid var(--hairline); background: var(--surface-3); cursor: pointer; }
.strip-name .rc { font-size: 8px; color: var(--accent-3); }
.fx-stack { padding: 4px; display: flex; flex-direction: column; gap: 2px; border-bottom: 1px solid var(--hairline); }
.fx-slot { height: 16px; border-radius: 4px; display: flex; align-items: center; gap: 4px; padding: 0 6px; font-size: 8.5px; font-weight: 600; letter-spacing: 0.03em; background: var(--surface-0); border: 1px solid var(--hairline-2); color: var(--dim); cursor: pointer; transition: .1s; }
.fx-slot:hover { border-color: rgba(255,255,255,0.16); color: var(--text-hi); }
.fx-slot.filled { background: color-mix(in srgb, var(--fxc,#2ea6ff) 16%, var(--surface-0)); color: color-mix(in srgb,var(--fxc,#2ea6ff) 80%, #fff); border-color: color-mix(in srgb,var(--fxc,#2ea6ff) 40%, transparent); }
.fx-slot.bypass { opacity: 0.4; text-decoration: line-through; }
.fx-slot .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex: none; }
.fx-slot .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.strip-fader { flex: 1; display: flex; padding: 8px 6px; gap: 6px; min-height: 0; }
.meter-pair { display: flex; gap: 2px; flex: none; }
.meter-pair canvas { width: 7px; height: 100%; background: var(--surface-0); border-radius: 2px; }
.fader-col { flex: 1; position: relative; display: flex; justify-content: center; }
.fader-track { width: 5px; height: 100%; background: var(--surface-0); border-radius: 3px; position: relative; cursor: ns-resize; box-shadow: inset 0 0 0 1px var(--hairline-2); }
.fader-fill { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, color-mix(in srgb,var(--accent) 50%, transparent), color-mix(in srgb,var(--accent) 14%, transparent)); border-radius: 3px; }
.fader-cap { position: absolute; left: 50%; width: 22px; height: 9px; margin-left: -11px; background: linear-gradient(180deg,#3a414c,#262b33); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
.fader-0db { position: absolute; left: -3px; right: -3px; height: 1px; background: var(--accent-3); opacity: 0.6; }
.strip-foot { padding: 5px 6px 7px; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid var(--hairline); }
.strip-foot .pan-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
.strip-foot .ms { justify-content: center; }
.strip-foot .ms button { width: 22px; height: 16px; }
.db-read { text-align: center; font-family: var(--mono); font-size: 8.5px; color: var(--dim); }

/* ---------- insert fx rack panel ---------- */
.ifx-rack { width: 218px; flex: none; display: flex; flex-direction: column; background: linear-gradient(180deg, var(--surface-2), var(--surface-1)); border-left: 1px solid var(--hairline); }
.ifx-head { flex: none; padding: 8px 12px; border-bottom: 1px solid var(--hairline); }
.ifx-ttl { display: block; font-size: 10.5px; font-weight: 800; letter-spacing: 0.12em; color: var(--text-hi); }
.ifx-name { display: block; font-size: 10px; color: var(--accent-3); margin-top: 3px; letter-spacing: 0.04em; }
.ifx-slots { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 5px; }
.ifx-slot { border-radius: 7px; padding: 6px 7px; background: var(--surface-0); border: 1px solid var(--hairline); }
.ifx-slot.filled { border-color: color-mix(in srgb, var(--fxc,#2ea6ff) 40%, var(--hairline)); background: color-mix(in srgb, var(--fxc,#2ea6ff) 9%, var(--surface-0)); }
.ifx-slot.byp { opacity: 0.5; }
.ifx-row { display: flex; align-items: center; gap: 6px; }
.ifx-power { width: 20px; height: 20px; flex: none; border-radius: 5px; display: grid; place-items: center; background: var(--surface-3); border: 1px solid var(--hairline); color: var(--faint); transition: .12s; }
.ifx-power.on { background: color-mix(in srgb, var(--fxc,#39ff14) 22%, var(--surface-3)); color: var(--fxc,#39ff14); border-color: color-mix(in srgb,var(--fxc,#39ff14) 60%, transparent); box-shadow: 0 0 calc(8px*var(--glow)) color-mix(in srgb,var(--fxc,#39ff14) 50%, transparent); }
.ifx-power:disabled { opacity: 0.4; }
.ifx-num { width: 12px; flex: none; font-size: 9px; color: var(--faint); text-align: center; }
.ifx-sel { flex: 1; min-width: 0; height: 22px; border-radius: 5px; background: var(--surface-3); border: 1px solid var(--hairline); color: var(--text-hi); font-family: var(--ui); font-size: 10.5px; font-weight: 600; padding: 0 6px; outline: none; cursor: pointer; }
.ifx-sel:focus { border-color: color-mix(in srgb,var(--accent) 50%, transparent); }
.ifx-wetrow { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.ifx-wlbl { font-size: 7.5px; letter-spacing: 0.08em; color: var(--faint); }
.ifx-wval { font-size: 8.5px; color: var(--fxc,var(--accent)); width: 28px; text-align: right; }
.ifx-wet { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; border-radius: 3px; background: #2a2f38; outline: none; }
.ifx-wet::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--fxc,var(--accent)); cursor: pointer; box-shadow: 0 0 calc(6px*var(--glow)) color-mix(in srgb,var(--fxc,#39ff14) 60%, transparent); }
.ifx-wet:disabled { opacity: 0.35; }
/* audio-in dropdown on mixer strips */
.audio-in { width: 100%; height: 15px; margin: 0; border: none; border-bottom: 1px solid var(--hairline); background: var(--surface-0); color: var(--faint); font-family: var(--mono); font-size: 7.5px; letter-spacing: 0.03em; padding: 0 4px; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; text-align: center; text-align-last: center; }
.audio-in:hover { color: var(--text); }
.audio-in.live { color: var(--accent); background: color-mix(in srgb,var(--accent) 12%, var(--surface-0)); }
/* pitch-fix sub-panel */
.ifx-slot.pf.filled { border-color: color-mix(in srgb,#39ff14 45%, var(--hairline)); }
.ifx-pf { margin-top: 7px; }
.ifx-pf-knobs { display: flex; align-items: flex-start; gap: 8px; }
.pf-knob { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 38px; flex: none; }
.pf-klbl { font-size: 7px; letter-spacing: 0.08em; color: var(--faint); }
.pf-kval { font-size: 8px; color: var(--text-hi); }
.pf-scale { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.pf-scale .ifx-sel { width: 100%; height: 20px; }
.tuner-ribbon { display: block; width: 100%; height: 26px; margin-top: 8px; background: var(--surface-0); border: 1px solid var(--hairline); border-radius: 5px; }
/* render / export progress */
.eopt-row { display: flex; gap: 8px; }
.render-box { padding: 8px 2px 4px; }
.render-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--accent); text-align: center; margin-bottom: 14px; }
.render-bar { height: 12px; border-radius: 7px; background: var(--surface-0); border: 1px solid var(--hairline); overflow: hidden; }
.render-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, color-mix(in srgb,var(--accent) 55%, transparent), var(--accent)); box-shadow: 0 0 calc(10px*var(--glow)) color-mix(in srgb,var(--accent) 60%, transparent); transition: width .12s linear; }
.render-sub { text-align: center; font-size: 10.5px; color: var(--dim); margin-top: 10px; letter-spacing: 0.04em; }

/* ---------- piano roll ---------- */
.pr { flex: 1; display: flex; min-height: 0; }
.pr-keys { width: 64px; flex: none; overflow: hidden; border-right: 1px solid var(--hairline); background: var(--surface-1); position: relative; }
.pr-scroll { flex: 1; overflow: auto; position: relative; }
.pr-grid { position: relative; }
.pr-lane { position: absolute; left: 0; right: 0; border-bottom: 1px solid var(--hairline-2); }
.pr-lane.black { background: rgba(0,0,0,0.28); }
.pr-lane.croot { background: rgba(46,166,255,0.05); border-bottom-color: rgba(46,166,255,0.18); }
.pr-key { position: absolute; left: 0; right: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 7px; font-family: var(--mono); font-size: 8.5px; border-bottom: 1px solid var(--hairline-2); }
.pr-key.white { background: #20242b; color: var(--dim); }
.pr-key.black { background: #0c0e12; color: var(--faint); }
.pr-key.croot { color: var(--accent-3); }
.pr-note { position: absolute; border-radius: 3px; background: color-mix(in srgb, var(--ncol,#b07bff) 85%, #000); box-shadow: 0 0 calc(6px*var(--glow)) color-mix(in srgb,var(--ncol,#b07bff) 50%, transparent), inset 0 0 0 1px rgba(255,255,255,0.22); cursor: grab; }
.pr-note .rs { position: absolute; right: 0; top: 0; bottom: 0; width: 6px; cursor: ew-resize; }
.pr-gl { position: absolute; top: 0; bottom: 0; width: 1px; }
.pr-gl.beat { background: var(--hairline); }
.pr-gl.sub { background: var(--hairline-2); }
.pr-gl.bar { background: rgba(255,255,255,0.16); }

/* ---------- playlist ---------- */
.pl { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.pl-toolbar { height: 36px; flex: none; display: flex; align-items: center; gap: 10px; padding: 0 12px; border-bottom: 1px solid var(--hairline); background: var(--surface-1); }
.brush-grp { display: flex; gap: 4px; }
.brush { height: 24px; padding: 0 10px; border-radius: 6px; font-family: var(--mono); font-size: 10.5px; font-weight: 700; color: var(--dim); background: var(--surface-3); border: 1px solid var(--hairline); }
.brush.on { color: #fff; border-color: var(--bc); background: color-mix(in srgb, var(--bc) 28%, var(--surface-3)); }
.brush.erase.on { background: #c0392b; border-color: #c0392b; }
.pl-scroll { flex: 1; overflow: auto; }
.pl-lane { display: flex; height: 38px; border-bottom: 1px solid var(--hairline-2); }
.pl-lane.audio { height: 46px; }
.pl-lane-head { width: 120px; flex: none; display: flex; align-items: center; gap: 7px; padding: 0 10px; border-right: 1px solid var(--hairline); font-size: 11px; font-weight: 600; color: var(--text); position: sticky; left: 0; background: var(--surface-1); z-index: 3; }
.pl-track { flex: 1; position: relative; display: grid; }
.pl-cell { border-right: 1px solid var(--hairline-2); cursor: cell; }
.pl-cell.bar4 { border-right-color: var(--hairline); }
.pl-block { position: absolute; top: 3px; bottom: 3px; border-radius: 4px; display: flex; align-items: center; padding: 0 7px; font-family: var(--mono); font-size: 9.5px; font-weight: 700; color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16); overflow: hidden; }
.pl-clip { position: absolute; top: 4px; bottom: 4px; border-radius: 5px; background: linear-gradient(180deg, color-mix(in srgb,var(--accent-3) 30%, var(--surface-2)), var(--surface-2)); border: 1px solid color-mix(in srgb,var(--accent-3) 40%, transparent); overflow: hidden; }
.pl-clip canvas { width: 100%; height: 100%; display: block; }
.pl-clip .cn { position: absolute; left: 6px; top: 3px; font-size: 9px; font-family: var(--mono); color: var(--text-hi); letter-spacing: 0.04em; }
.pl-playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); box-shadow: 0 0 calc(8px*var(--glow)) var(--accent); z-index: 5; pointer-events: none; }
.pl-loop { position: absolute; top: 0; height: 4px; background: var(--accent); opacity: 0.6; z-index: 4; }

/* ---------- modal / toast ---------- */
.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 200; }
.modal { width: 460px; background: var(--surface-2); border: 1px solid var(--hairline); border-radius: 14px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
.modal-head { display: flex; align-items: center; gap: 11px; padding: 16px 18px; border-bottom: 1px solid var(--hairline); }
.modal-head h3 { font-size: 15px; font-weight: 700; color: var(--text-hi); }
.modal-head .mi { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; background: color-mix(in srgb,var(--accent) 16%, var(--surface-3)); color: var(--accent); }
.modal-body { padding: 16px 18px; }
.modal-foot { display: flex; justify-content: flex-end; gap: 9px; padding: 14px 18px; border-top: 1px solid var(--hairline); }
.fx-param { display: flex; align-items: center; gap: 10px; margin: 11px 0; }
.fx-param label { width: 76px; font-size: 11px; color: var(--dim); }
.fx-param .pv { width: 56px; text-align: right; font-family: var(--mono); font-size: 11px; color: var(--accent); }
.fx-typegrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
.fx-typegrid button { padding: 8px 4px; border-radius: 7px; font-size: 10px; font-weight: 700; background: var(--surface-0); border: 1px solid var(--hairline); color: var(--dim); }
.fx-typegrid button.on { color: var(--accent); border-color: color-mix(in srgb,var(--accent) 50%, transparent); background: color-mix(in srgb,var(--accent) 12%, var(--surface-0)); }

.toast-wrap { position: absolute; bottom: 18px; left: 50%; margin-left: -130px; display: flex; flex-direction: column; gap: 8px; z-index: 300; }
.toast { display: flex; align-items: center; gap: 9px; padding: 10px 15px; border-radius: 9px; background: var(--surface-3); border: 1px solid var(--hairline); font-size: 12.5px; color: var(--text-hi); box-shadow: 0 14px 36px rgba(0,0,0,0.5); animation: tin .2s ease; }
.toast .ti { color: var(--accent); display: grid; place-items: center; }
@keyframes tin { from { opacity: 0; transform: translateY(8px); } }

/* ---------- Studio Deployment Gateway (splash) ---------- */
.splash { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center;
  background: radial-gradient(1100px 680px at 50% 32%, rgba(157,78,221,0.12), transparent 64%), #07080a;
  font-family: var(--ui); color: var(--text); opacity: 1; transition: opacity .6s ease; }
.splash.closing { opacity: 0; pointer-events: none; }
.splash-inner { display: flex; flex-direction: column; align-items: center; gap: 26px; transform: translateY(-1.5%); animation: splash-rise .7s cubic-bezier(.16,.84,.44,1) both; }
@keyframes splash-rise { from { opacity: 0; transform: translateY(2%); } }
.splash-radar { position: relative; width: 208px; height: 208px; display: grid; place-items: center; }
.splash-radar .ring { position: absolute; border-radius: 50%; }
.splash-radar .ring.r1 { inset: 0; border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent); }
.splash-radar .ring.r2 { inset: 34px; border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent); }
.splash-radar .ring.r3 { inset: 68px; border: 1px solid color-mix(in srgb, var(--accent) 16%, transparent); }
.splash-radar .sweep { position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 0deg, color-mix(in srgb,var(--accent) 32%, transparent) 38deg, transparent 58deg);
  animation: splash-spin 3.2s linear infinite; }
@keyframes splash-spin { to { transform: rotate(360deg); } }
.splash-radar .pulse { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent);
  animation: splash-ping 2.4s cubic-bezier(0,0,.2,1) infinite; }
@keyframes splash-ping { 0% { transform: scale(.34); opacity: .85; } 80%,100% { transform: scale(1); opacity: 0; } }
.splash-radar .core { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); z-index: 2;
  box-shadow: 0 0 22px var(--accent), 0 0 56px color-mix(in srgb,var(--accent) 55%, transparent); }
.splash-title { font-family: var(--disp); font-size: 36px; font-weight: 700; letter-spacing: .15em; color: var(--text-hi); text-transform: uppercase; }
.splash-title b { color: var(--accent); text-shadow: 0 0 26px color-mix(in srgb,var(--accent) 55%, transparent); }
.splash-tag { font-family: var(--mono); font-size: 11px; letter-spacing: .34em; color: var(--dim); text-transform: uppercase; margin-top: -18px; }
.splash-wave { display: flex; align-items: flex-end; gap: 4px; height: 32px; }
.splash-wave i { width: 4px; height: 6px; border-radius: 2px; background: linear-gradient(180deg, var(--accent-2), var(--accent)); animation: splash-bar 1.1s ease-in-out infinite; }
@keyframes splash-bar { 0%,100% { height: 6px; opacity: .5; } 50% { height: 32px; opacity: 1; } }
.splash-check { font-family: var(--mono); font-size: 11.5px; line-height: 2; color: var(--dim); min-width: 340px;
  padding: 16px 20px; border-radius: 12px; background: rgba(255,255,255,.018); border: 1px solid var(--hairline); }
.splash-check .row { display: flex; justify-content: space-between; gap: 24px; }
.splash-check .ok { color: var(--accent); font-weight: 600; }
.splash-deploy { margin-top: 4px; padding: 0 42px; height: 60px; border-radius: 13px;
  font-family: var(--disp); font-size: 16px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase;
  color: var(--accent-ink); background: linear-gradient(135deg, var(--accent), #5a189a);
  border: 1px solid color-mix(in srgb, var(--accent) 60%, #fff);
  box-shadow: 0 0 0 1px color-mix(in srgb,var(--accent) 45%, transparent), 0 0 44px color-mix(in srgb,var(--accent) 42%, transparent);
  transition: transform .12s ease, box-shadow .22s ease; }
.splash-deploy:hover { transform: translateY(-2px); box-shadow: 0 0 0 1px var(--accent), 0 0 64px color-mix(in srgb,var(--accent) 60%, transparent); }
.splash-deploy:active { transform: translateY(0); }
.splash-hint { font-family: var(--mono); font-size: 10px; letter-spacing: .22em; color: var(--faint); text-transform: uppercase; }
</style>
